name: Encrypt Value

on:
  workflow_dispatch:

jobs:
  encrypt:
    runs-on: ubuntu-latest
    steps:
      - name: Encrypt
        shell: pwsh
        env:
          PLAINTEXT_VALUE: ${{ secrets.STEAM_WORKSHOP_AUTH_CODE }}
          DECRYPT_PASSWORD: ${{ secrets.VERSION_DECRYPT_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          $key   = [System.Text.Encoding]::UTF8.GetBytes($env:DECRYPT_PASSWORD)
          $plain = [System.Text.Encoding]::UTF8.GetBytes($env:PLAINTEXT_VALUE)

          if ($plain.Length -gt $key.Length) {
              throw "Plaintext ($($plain.Length) bytes) longer than password ($($key.Length) bytes)."
          }

          $ct = [byte[]]::new($plain.Length)
          for ($i = 0; $i -lt $plain.Length; $i++) { $ct[$i] = $plain[$i] -bxor $key[$i] }

          Write-Host "==== ENCRYPTED VALUE (base64) ===="
          Write-Host ([Convert]::ToBase64String($ct))
          Write-Host "=================================="
